  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

th .apps.googleusercontent.com)\n  // to bake it in for everyone. Until then, set it once via the \"Set up sign-in\"\n  // panel on the lock screen (stored in that browser).\n  GOOGLE_CLIENT_ID = '104013836956-1jpco8kae00jfrl0pdqfdha35eisogqd.apps.googleusercontent.com';\n\n  state = { data: {}, room: '', online: false, configured: false, showQR: false, qrUrl: '', shareLink: '', weekEnding: '', locked: true, user: null, authError: '', setupOpen: false, cidInput: '' };\n\n  // ---------------- backend (Google Sheet) config ----------------\n  apiUrl(){\n    let v = '';\n    try { v = localStorage.getItem(this.API_KEY) || ''; } catch(e){}\n    if (!v) v = this.BAKED_API || '';\n    v = (v || '').trim();\n    if (!v || v.indexOf('PASTE_YOUR') === 0) return '';\n    return v;\n  }\n  connectSheet(){\n    const cur = this.apiUrl();\n    const url = (typeof prompt === 'function')\n      ? prompt('Paste your Google Apps Script Web App URL (ends with /exec):', cur || '')\n      : '';\n    if (url === null || url === undefined) return;\n    const u = (url || '').trim();\n    try { localStorage.setItem(this.API_KEY, u); } catch(e){}\n    this.setState({ configured: !!this.apiUrl() });\n    if (this.state.room) this.startSync(this.state.room);\n  }\n\n  // ---------------- Google sign-in config ----------------\n  clientId(){\n    let v = '';\n    try { v = localStorage.getItem(this.CID_KEY) || ''; } catch(e){}\n    if (!v) v = this.GOOGLE_CLIENT_ID || '';\n    v = (v || '').trim();\n    if (!v || v.indexOf('PASTE') === 0) return '';\n    return v;\n  }\n  decodeJwt(t){\n    try {\n      const p = t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');\n      const pad = p.length % 4 ? '='.repeat(4 - (p.length % 4)) : '';\n      return JSON.parse(decodeURIComponent(escape(atob(p + pad))));\n    } catch(e){ return null; }\n  }\n\n  componentDidMount(){\n    this.setState({ configured: !!this.apiUrl() });\n    let user = null;\n    try { const raw = localStorage.getItem(this.USER_K   this.gisInited = false; this.gbtnRendered = false;\n    this.setState({ user:null, locked:true, data:{}, room:'', online:false });\n  }\n  openSetup(){ this.setState({ setupOpen:true, cidInput: this.clientId() || '' }); }\n  closeSetup(){ this.setState({ setupOpen:false }); }\n  onCidInput(e){ this.setState({ cidInput: e.target.value }); }\n  saveClientId(){\n    const v = (this.state.cidInput || '').trim();\n    if (!v) return;\n    try { localStorage.setItem(this.CID_KEY, v); } catch(e){}\n    this.gisInited = false; this.gbtnRendered = false;\n    this.setState({ setupOpen:false });\n    setTimeout(()=>this.tryInitGis(), 60);\n  }\n\n  // ---------------- week / room ----------------\n  iso(d){ const y=d.getFullYear(); const m=String(d.getMonth()+1).padStart(2,'0'); const da=String(d.getDate()).padStart(2,'0'); return y+'-'+m+'-'+da; }\n  currentWeekEnding(){\n    const d = new Date();\n    const day = d.getDay(); // 0 Sun .. 6 Sat\n    const add = day === 0 ? -1 : (6 - day); // Sun -> last Sat; else this week's Sat\n    return this.iso(new Date(d.getFullYear(), d.getMonth(), d.getDate() + add));\n  }\n  roomForWeek(iso){ return 'FT-' + iso; }\n  fmtDate(iso){ try { const p=iso.split('-'); return new Date(+p[0],+p[1]-1,+p[2]).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); } catch(e){ return iso; } }\n\n  bootApp(forceWeek){\n    let weekEnding = forceWeek || '';\n    if (!weekEnding){\n      const hash = (location.hash || '').replace(/^#/,'').trim();\n      if (/^FT-\\d{4}-\\d{2}-\\d{2}$/.test(hash)) weekEnding = hash.slice(3);\n    }\n    if (!weekEnding) weekEnding = this.currentWeekEnding();\n    const room = this.roomForWeek(weekEnding);\n    let data = {};\n    try {\n      const savedRoom = localStorage.getItem(this.ROOM) || '';\n      const raw = localStorage.getItem(this.LS);\n      if (savedRoom === room && raw) data = JSON.parse(raw);\n    } catch(e){}\n    try { localStorage.setItem(this.ROOM, room); localStorage.setItem(this.LS, JSON.stringify(data)); } catch(e){}\n    try { history.replaceState(null,'','#'+room); } catch(e){}\n    this.setState({ room, weekEnding, data, locked:false, configured: !!this.apiUrl() });\n    this.startSync(room);\n  }\n  onWeek(e){ const v = e.target.value; if (!v) return; this.stopSync(); this.bootApp(v); }\n  newWeek(){\n    const cur = this.state.weekEnding || this.currentWeekEnding();\n    const p = cur.split('-');\n    const next = this.iso(new Date(+p[0], +p[1]-1, +p[2] + 7));\n    if (typeof confirm === 'function' && !confirm('Start the scorecard for week ending ' + this.fmtDate(next) + '? The current week stays saved.')) return;\n    this.stopSync();\n    this.bootApp(next);\n  }\n\n  // ---------------- google sheets sync ----------------\n  loadOutbox(room){ try { return JSON.parse(localStorage.getItem('cfa_outbox_'+room)||'[]'); } catch(e){ return []; } }\n  saveOutbox(){ try { localStorage.setItem('cfa_outbox_'+this.state.room, JSON.stringify(this.outbox||[])); } catch(e){} }\n\n  startSync(room){\n    this.stopSync();\n    this.localTs = {};\n    this.lastServerTs = 0;\n    this.outbox = this.loadOutbox(room);\n    this.outbox.forEach(it=>{ this.localTs[it.k]=Math.max(this.localTs[it.k]||0, it.ts); });\n    if (!this.apiUrl()){ this.setState({ online:false, configured:false }); return; }\n    this.setState({ configured:true });\n    this.pull(true);\n    this.flush();\n    this.pullTimer = setInterval(()=>this.pull(false), 3500);\n    this.flushTimer = setInterval(()=>this.flush(), 2500);\n  }\n  stopSync(){ try{ clearInterval(this.pullTimer); }catch(e){} try{ clearInterval(this.flushTimer); }catch(e){} this.pullTimer=null; this.flushTimer=null; }\n\n  pull(initial){\n    const room=this.state.room; const api=this.apiUrl();\n    if (!api || !room) return;\n    const since = initial ? 0 : Math.max(0, (this.lastServerTs||0) - 10000);\n    const url = api + (api.indexOf('?')>=0?'&':'?') + 'room=' + encodeURIComponent(room) + '&since=' + since;\n    fetch(url, { method:'GET' })\n      .then(r=>r.json())\n      .then(res=>{\n        if (!res || !res.ok) throw new Error('bad');\n        const incoming = res.data || {}; const its = res.ts || {};\n        let changed = false; const data = { ...this.state.data };\n        Object.keys(incoming).forEach(k=>{\n          const iv = incoming[k];\n          const v = (iv===null||iv===undefined) ? '' : String(iv);\n          const sts = Number(its[k])||0;\n          const lts = this.localTs[k]||0;\n          if (sts > this.lastServerTs) this.lastServerTs = sts;\n          if (sts >= lts){ if (data[k] !== v){ data[k] = v; changed = true; } }\n        });\n        if (this.outbox && this.outbox.length){\n          this.outbox = this.outbox.filter(it=>{ const sts=Number(its[it.k])||0; return !(sts >= it.ts); });\n          this.saveOutbox();\n        }\n        if (changed){ this.save(data); this.setState({ data, online:true }); }\n        else this.setState({ online:true });\n      })\n      .catch(()=>{ this.setState({ online:false }); });\n  }\n\n  flush(){\n    const room=this.state.room; const api=this.apiUrl();\n    if (!api || !room) return;\n    if (!this.outbox || !this.outbox.length) return;\n    const items = this.outbox.slice(0,200);\n    fetch(api, { method:'POST', headers:{ 'Content-Type':'text/plain;charset=utf-8' }, body: JSON.stringify({ room, items }) })\n      .then(r=>r.json())\n      .then(res=>{\n        if (res && res.ok){\n          const sent = new Set(items.map(i=>i.k+'|'+i.ts));\n          this.outbox = (this.outbox||[]).filter(i=>!sent.has(i.k+'|'+i.ts));\n          this.saveOutbox();\n          this.setState({ online:true });\n        }\n      })\n      .catch(()=>{});\n  }\n\n  save(data){ try { localStorage.setItem(this.LS, JSON.stringify(data)); } catch(e){} }\n\n  set(key, val){\n    const ts = Date.now();\n    this.setState(s=>{ const data={...s.data,[key]:val}; this.save(data); return {data}; });\n    this.localTs = this.localTs || {};\ ',97,'%')},\n        {sub:'Guest Ratings'},\n        {l:'Google Rating', m:'sNum', t:T('>=',4.0,'')},\n        {l:'DoorDash', m:'sNum'},\n        {l:'Uber Eats', m:'sNum'},\n      ]},\n    ];\n  }\n\n  // ---------- helpers ----------\n  parseNum(v){ if (v===undefined||v===null||v==='') return null; const n=parseFloat(String(v).replace(/[$,%\\s]/g,'')); return isNaN(n)?null:n; }\n  commas(n,d){ return Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}); }\n  isDaily(m){ return ['cur','cnt','num','avgcur','pct','navg'].includes(m); }\n  isAvg(m){ return ['avgcur','pct','navg'].includes(m); }\n  unitOf(m){ if(['cur','avgcur','sCur'].includes(m))return '$'; if(['pct','sPct'].includes(m))return '%'; return ''; }\n\n  aggregate(m, vals){\n    const nums = vals.map(v=>this.parseNum(v)).filter(n=>n!==null);\n    if (!nums.length) return null;\n    const sum = nums.reduce((a,b)=>a+b,0);\n    return this.isAvg(m) ? sum/nums.length : sum;\n  }\n  fmtAgg(m, val){\n    if (val===null) return '—';\n    if (m==='cur'||m==='avgcur'||m==='wage') return '$'+this.commas(val, Math.abs(val%1)<1e-9?0:2);\n    if (m==='pct') return this.commas(val, val%1?1:0)+'%';\n    if (m==='navg') return this.commas(val, val%1?1:0);\n    if (m==='cnt') return this.commas(val,0);\n    return this.commas(val, Math.abs(val%1)<1e-9?0:2);\n  }\n  pass(t, value){\n    if (!t || value===null) return false;\n    if (t.op==='>') return value>t.val;\n    if (t.op==='<') return value<t.val;\n    if (t.op==='>=') return value>=t.val;\n    if (t.op==='<=') return value<=t.val;\n    return false;\n  }\n  tagText(t){ if(!t||t.op==='yn') return ''; const sym=t.op==='>='?'≥':t.op==='<='?'≤':t.op; const v=t.unit==='$'?'$'+t.val:t.unit==='%'?t.val+'%':t.unit?t.val+' '+t.unit:t.val; return sym+' '+v; }\n  scoreColor(f){ if (f>=0.9) return '#1f7a4d'; if (f>=0.7) return '#3f8f3f'; if (f>=0.5) return '#c98a00'; return '#cc3a2e'; }\n\n  // ---------- build view ----------\n  renderVals(){\n    const spec = this.buildSpec();\n    const data = this.state.data;\n    const dayInit=['M','T','W','T','F','S'];\n    const dayFull=['Mon','Tue','Wed','Thu','Fri','Sat'];\n    const dotPass='flex:none;width:7px;height:7px;border-radius:50%;background:#3f8f3f';\n    const dotFail='flex:none;width:7px;height:7px;border-radius:50%;background:#cc3a2e';\n    const dotNone='flex:none;width:7px;height:7px;border-radius:50%;background:transparent';\n    const tagStyle='font-size:10px;font-weight:700;color:#a39c90;background:rgba(0,0,0,.045);padding:1px 6px;border-radius:5px;white-space:nowrap;flex:none';\n\n    const sectionPcts=[];\n    const sections = spec.map((sec, si)=>{\n      let scored=0, passed=0;\n      const rows = sec.rows.map((r, ri)=>{\n        if (r.sub) return {isSub:true, label:r.sub};\n        const baseKey='s'+si+'r'+ri;\n        const hasScore = !!r.t;\n\n        if (r.m==='calc'){\n          const dayVals = dayInit.map((_,di)=>{\n            const rec=this.parseNum(data['s'+si+'r0d'+di]);\n            const pos=this.parseNum(data['s'+si+'r1d'+di]);\n            const neg=this.parseNum(data['s'+si+'r2d'+di]);\n            if (rec===null && pos===null && neg===null) return null;\n            return (rec||0)+(pos||0)-(neg||0);\n          });\n          const nums=dayVals.filter(v=>v!==null);\n          const agg = nums.length? nums.reduce((a,b)=>a+b,0) : null;\n          return {\n            isCalc:true, label:r.l, dotStyle:dotNone, tag:'', tagStyle:'display:none',\n            totalText:this.fmtAgg('cur', agg),\n            totalStyle: agg===null?'flex:none;font-size:13px;font-weight:700;color:#c4bdb0':'flex:none;font-size:14px;font-weight:800;letter-spacing:-.01em;color:#1c1a17',\n            cells: dayVals.map((v,di)=>({day:dayInit[di], text: v===null?'—':this.fmtAgg('cur', v)}))\n          };\n        }\n\n        if (r.m==='calcPct'){\n          const dayPcts = dayInit.map((_,di)=>{\n            const sales=this.parseNum(data['s0r0d'+di]);\n            if (sales===null || sales===0) return null;\n            const rec=this.parseNum(data['s'+si+'r0d'+di]);\n            const pos=this.parseNum(data['s'+si+'r1d'+di]);\n            const neg=this.parseNum(data['s'+si+'r2d'+di]);\n            const tw=(rec||0)+(pos||0)-(neg||0);\n            return tw/sales*100;\n          });\n          let sumTW=0, sumSales=0, anySales=false;\n          dayInit.forEach((_,di)=>{\n            const rec=this.parseNum(data['s'+si+'r0d'+di]);\n            const pos=this.parseNum(data['s'+si+'r1d'+di]);\n            const neg=this.parseNum(data['s'+si+'r2d'+di]);\n            const sales=this.parseNum(data['s0r0d'+di]);\n            if (rec!==null||pos!==null||neg!==null) sumTW += (rec||0)+(pos||0)-(neg||0);\n            if (sales!==null){ sumSales += sales; anySales=true; }\n          });\n          const agg = (anySales && sumSales!==0) ? (sumTW/sumSales*100) : null;\n          const ok = hasScore && this.pass(r.t, agg);\n          if (hasScore){ scored++; if (ok) passed++; }\n          return {\n            isCalc:true, label:r.l,\n            dotStyle: hasScore?(agg===null?dotFail:(ok?dotPass:dotFail)):dotNone,\n            tag:this.tagText(r.t), tagStyle: r.t?tagStyle:'display:none',\n            totalText: agg===null?'—':this.commas(agg, agg%1?1:0)+'%',\n            totalStyle: agg===null?'flex:none;font-size:13px;font-weight:700;color:#c4bdb0':'flex:none;font-size:14px;font-weight:800;letter-spacing:-.01em;color:#1c1a17',\n            cells: dayPcts.map((v,di)=>({day:dayInit[di], text: v===null?'—':this.commas(v, v%1?1:0)+'%'}))\n          };\n        }\n\n        if (r.m==='yn'){\n          const vals = dayInit.map((_,di)=> data[baseKey+'d'+di] || '');\n          const noN = vals.filter(v=>v==='No').length;\n          const yesN = vals.filter(v=>v==='Yes').length;\n          const minYes = r.min || 0;\n          const ok = minYes ? (yesN>=minYes && noN===0) : (yesN>0 && noN===0);\n          if (hasScore){ scored++; if (ok) passed++; }\n          const cells = vals.map((v,di)=>{\n            const key=baseKey+'d'+di;\n            let st='width:100%;font-family:inherit;font-size:11px;font-weight:800;padding:5px 1px;border-radius:6px;cursor:pointer;border:1px solid rgba(0,0,0,.12);background:#fff;color:#c4bdb0';\n            let tx='–';\n            if (v==='Yes'){ st='width:100%;font-family:inherit;font-size:11px;font-weight:800;padding:5px 1px;border-radius:6px;cursor:pointer;border:1px solid #3f8f3f;background:#eaf4ea;color:#2f7a2f'; tx='Yes'; }\n            else if (v==='No'){ st='width:100%;font-family:inherit;font-size:11px;font-weight:800;padding:5px 1px;border-radius:6px;cursor:pointer;border:1px solid #cc3a2e;background:#fbeae8;color:#c0392b'; tx='No'; }\n            return {day:dayInit[di], text:tx, style:st, onClick:()=>{ const nv = v===''?'Yes':v==='Yes'?'No':''; this.set(key, nv); }};\n          });\n          const totalText = ok?'Complete':(noN>0?'Issue':(minYes&&yesN>0? yesN+' / '+minYes :'—'));\n          const totalStyle = ok\n            ? 'flex:none;font-size:11px;font-weight:800;padding:2px 9px;border-radius:999px;background:#3f8f3f;color:#fff'\n            : (noN>0 ? 'flex:none;font-size:11px;font-weight:800;padding:2px 9px;border-radius:999px;background:#cc3a2e;color:#fff'\n                     : 'flex:none;font-size:12px;font-weight:700;color:#c4bdb0');\n          return {isYN:true, label:r.l, dotStyle:hasScore?(ok?dotPass:dotFail):dotNone, cells, totalText, totalStyle,\n            hasNote: !!r.note, notePlaceholder: r.notePh || '', noteValue: data[baseKey+'note']||'', onNote:(e)=>this.set(baseKey+'note', e.target.value)};\n        }\n\n        if (r.m==='text'){\n          const baseSt='flex:1;font-family:inherit;font-size:12px;padding:5px 8px;border:1px solid rgba(0,0,0,.12);border-radius:7px;background:#fff;color:#36322c;outline:none;min-width:0';\n          const flagSt='flex:1;font-family:inherit;font-size:12px;font-weight:700;padding:5px 8px;border:1.5px solid #cc3a2e;border-radius:7px;background:#fbeae8;color:#c0392b;outline:none;min-width:0';\n          const cells = dayFull.map((d,di)=>{ const key=baseKey+'d'+di; const v=data[key]||''; return {day:d, value:v, style:(r.flag && v.indexOf('*')>=0)?flagSt:baseSt, onChange:(e)=>this.set(key, e.target.value)}; });\n          return {isText:true, label:r.l, cells, hasHint: !!r.hint, hint: r.hint||''};\n        }\n\n        if (['sNum','sPct','sCur'].includes(r.m)){\n          const key=baseKey+'t';\n          const val=this.parseNum(data[key]);\n          const ok = hasScore && this.pass(r.t, val);\n          if (hasScore){ scored++; if (ok) passed++; }\n          return {\n            isSingle:true, label:r.l,\n            tag:this.tagText(r.t), tagStyle: r.t?tagStyle:'display:none',\n            dotStyle: hasScore?(val===null?dotFail:(ok?dotPass:dotFail)):dotNone,\n            unit: this.unitOf(r.m), unitStyle: this.unitOf(r.m)?'font-size:13px;font-weight:700;color:#8a847a':'display:none',\n            single:{ value:data[key]||'', onChange:(e)=>this.set(key, e.target.value) }\n          };\n        }\n\n        const vals = dayInit.map((_,di)=> data[baseKey+'d'+di] || '');\n        let agg = this.aggregate(r.m, vals);\n        if (r.z && agg===null) agg = 0;\n        const ok = hasScore && this.pass(r.t, agg);\n        if (hasScore){ scored++; if (ok) passed++; }\n        const cells = vals.map((v,di)=>{ const key=baseKey+'d'+di;\n          const onChange = r.m==='wage'\n            ? (e)=>{ const n=this.parseNum(e.target.value); this.set(key, n===null?'':String(Math.round(n/2*100)/100)); }\n            : (e)=>this.set(key, e.target.value);\n          return {day:dayInit[di], value:v, onChange}; });\n        return {\n          isNum:true, label:r.l,\n          tag:this.tagText(r.t), tagStyle: r.t?tagStyle:'display:none',\n          dotStyle: hasScore?(agg===null?dotFail:(ok?dotPass:dotFail)):dotNone,\n          totalText:this.fmtAgg(r.m, agg),\n          totalStyle: agg===null?'flex:none;font-size:13px;font-weight:700;color:#c4bdb0':'flex:none;font-size:14px;font-weight:800;letter-spacing:-.01em;color:#1c1a17',\n          cells,\n          hasHint: !!r.hint, hint: r.hint||'',\n          hasNote: !!r.note,\n          notePlaceholder: r.notePh || 'Product / reason for variance',\n          noteValue: data[baseKey+'note']||'',\n          onNote:(e)=>this.set(baseKey+'note', e.target.value)\n        };\n      });\n\n      const frac = scored? passed/scored : null;\n      sectionPcts.push(frac);\n      const scoreText = frac===null? '—' : Math.round(frac*100)+'%';\n      const scoreStyle = frac===null\n        ? 'flex:none;font-size:12px;font-weight:800;padding:4px 10px;border-radius:999px;background:rgba(0,0,0,.05);color:#a39c90'\n        : `flex:none;font-size:12px;font-weight:800;padding:4px 10px;border-radius:999px;background:${this.scoreColor(frac)};color:#fff`;\n      return {title:sec.title, scoreText, scoreStyle, rows, enteredBy:data['s'+si+'_by']||'', onEnteredBy:(e)=>this.set('s'+si+'_by', e.target.value)};\n    });\n\n    const valid = sectionPcts.filter(p=>p!==null);\n    const overall = valid.length? valid.reduce((a,b)=>a+b,0)/valid.length : null;\n    const overallText = overall===null? '—' : Math.round(overall*100)+'%';\n    const names=[];\n    spec.forEach((s,si)=>{ const n=String(data['s'+si+'_by']||'').trim(); if(n) names.push(n); });\n    const contributorsText = names.length? Array.from(new Set(names)).join(', ') : 'None yet';\n    const overallStyle = overall===null\n      ? 'font-size:30px;font-weight:800;letter-spacing:-.02em;color:#c4bdb0'\n      : `font-size:30px;font-weight:800;letter-spacing:-.02em;color:${this.scoreColor(overall)}`;\n\n    const configured = this.state.configured;\n    const online = this.state.online;\n    const syncStatus = !configured ? 'Backend not connected' : (online ? 'Live sync on' : 'Reconnecting…');\n    const dotColor = !configured ? '#c4bdb0' : (online ? '#3f8f3f' : '#c98a00');\n    const connectBtnText = configured ? 'Sheet ✓' : 'Connect Sheet';\n    const connectBtnStyle = configured\n      ? 'font-family:inherit;font-size:12px;font-weight:700;padding:7px 12px;border-radius:9px;cursor:pointer;border:1px solid rgba(0,0,0,.14);background:#fff;color:#36322c'\n      : 'font-family:inherit;font-size:12px;font-weight:800;padding:7px 12px;border-radius:9px;cursor:pointer;border:1px solid #c98a00;background:#fff7ea;color:#9a6b00';\n\n    const hasClientId = !!this.clientId();\n    const setupOpen = this.state.setupOpen || !hasClientId;\n    const user = this.state.user;\n\n    return {\n      sections, overallText, overallStyle,\n      weekEnding: this.state.weekEnding, contributorsText,\n      weekEndingLabel: this.state.weekEnding ? this.fmtDate(this.state.weekEnding) : '—',\n      onWeek:(e)=>this.onWeek(e),\n      print:()=>window.print(),\n      newWeek:()=>this.newWeek(),\n      room:this.state.room,\n      syncDotStyle:'width:8px;height:8px;border-radius:50%;flex:none;background:'+dotColor,\n      syncStatus,\n      signedInText: user ? ('Signed in as ' + (user.name || user.email)) : 'Not signed in',\n      connectBtnText, connectBtnStyle,\n      connectSheet:()=>this.connectSheet(),\n      showQR:this.state.showQR, shareLink:this.state.shareLink,\n      qrImg: this.state.qrUrl\n        ? React.createElement('img', { src:this.state.qrUrl, alt:'QR code', style:{ width:'208px', height:'208px', borderRadius:'10px', border:'1px solid rgba(0,0,0,.08)', imageRendering:'pixelated' } })\n        : null,\n      openQR:()=>this.openQR(),\n      closeQR:()=>this.closeQR(),\n      stop:(e)=>e.stopPropagation(),\n      // ---- auth ----\n      locked:this.state.locked,\n      hasClientId,\n      setupPanel: setupOpen,\n      signinPanel: hasClientId && !setupOpen,\n      authError:this.state.authError,\n      hasAuthError: !!this.state.authError,\n      cidInput:this.state.cidInput,\n      onCidInput:(e)=>this.onCidInput(e),\n      saveClientId:()=>this.saveClientId(),\n      openSetup:()=>this.openSetup(),\n      closeSetup:()=>this.closeSetup(),\n      gbtnRef:this.gbtnRef,\n      popupSignIn:()=>this.popupSignIn(),\n      signOut:()=>this.signOut(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
