document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e:12px;font-weight:700;padding:7px 12px;border-radius:9px;cursor:pointer;border:1px solid rgba(0,0,0,.14);background:#fff;color:#36322c\" style-active=\"transform:scale(.96)\">Join…<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div data-card=\"1\" style=\"background:#fffdf9;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:16px;margin-bottom:18px;box-shadow:0 1px 2px rgba(0,0,0,.04)\">\n      <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap\">\n        <div style=\"display:flex;flex-direction:column;gap:11px;flex:1;min-width:200px\">\n          <div>\n            <div style=\"font-size:11px;font-weight:700;color:#8a847a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px\">Week ending<\u002Fdiv>\n            <input type=\"date\" value=\"{{ weekEnding }}\" onchange=\"{{ onWeek }}\" style=\"font-family:inherit;font-size:14px;font-weight:600;padding:7px 10px;border:1px solid rgba(0,0,0,.12);border-radius:8px;background:#fff;color:#1c1a17;outline:none\" style-focus=\"border-color:#e4002b\">\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:11px;font-weight:700;color:#8a847a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px\">Reviewed by (MOD)<\u002Fdiv>\n            <input type=\"text\" placeholder=\"Name\" value=\"{{ reviewedBy }}\" onchange=\"{{ onReviewed }}\" style=\"width:100%;max-width:240px;font-family:inherit;font-size:14px;font-weight:600;padding:7px 10px;border:1px solid rgba(0,0,0,.12);border-radius:8px;background:#fff;color:#1c1a17;outline:none\" style-focus=\"border-color:#e4002b\">\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:11px;font-weight:700;color:#8a847a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px\">Contributors<\u002Fdiv>\n            <div style=\"font-size:13px;font-weight:600;color:#36322c;line-height:1.35\">{{ contributorsText }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:right\">\n          <div style=\"font-size:11px;font-weight:700;color:#8a847a;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px\">Overall score<\u002Fdiv>\n          <div style=\"{{ overallStyle }}\">{{ overallText }}<\u002Fdiv>\n          <div style=\"font-size:11px;font-weight:500;color:#a39c90;margin-top:2px\">auto-calculated<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-for list=\"{{ sections }}\" as=\"sec\" hint-placeholder-count=\"5\">\n      <div data-card=\"1\" style=\"background:#fffdf9;border:1px solid rgba(0,0,0,.07);border-radius:14px;margin-bottom:14px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.04)\">\n        <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:14px 16px 12px;border-bottom:1px solid rgba(0,0,0,.05)\">\n          <div style=\"min-width:0\">\n            <div style=\"font-size:15px;font-weight:800;letter-spacing:-.01em\">{{ sec.title }}<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:7px;margin-top:6px\">\n              <span style=\"font-size:10px;font-weight:700;color:#8a847a;text-transform:uppercase;letter-spacing:.05em;flex:none\">Entered by<\u002Fspan>\n              <input value=\"{{ sec.enteredBy }}\" onchange=\"{{ sec.onEnteredBy }}\" placeholder=\"Name\" style=\"width:150px;font-family:inherit;font-size:12px;font-weight:600;padding:4px 8px;border:1px solid rgba(0,0,0,.12);border-radius:6px;background:#fff;color:#36322c;outline:none\" style-focus=\"border-color:#e4002b\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"{{ sec.scoreStyle }}\">{{ sec.scoreText }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:2px 0\">\n          <sc-for list=\"{{ sec.rows }}\" as=\"row\" hint-placeholder-count=\"8\">\n\n            <sc-if value=\"{{ row.isSub }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:13px 16px 4px;font-size:11px;font-weight:700;color:#b06a00;text-transform:uppercase;letter-spacing:.07em\">{{ row.label }}<\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ row.isNum }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:9px 16px;border-top:1px solid rgba(0,0,0,.035)\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px\">\n                  <div style=\"display:flex;align-items:center;gap:8px;min-width:0\">\n                    <span style=\"{{ row.dotStyle }}\"><\u002Fspan>\n                    <span style=\"font-size:13px;font-weight:500;color:#36322c;line-height:1.25\">{{ row.label }}<\u002Fspan>\n                    <span style=\"{{ row.tagStyle }}\">{{ row.tag }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <span style=\"{{ row.totalStyle }}\">{{ row.totalText }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-top:8px\">\n                  <sc-for list=\"{{ row.cells }}\" as=\"c\" hint-placeholder-count=\"6\">\n                    <div>\n                      <div style=\"font-size:8.5px;font-weight:700;color:#b3aca0;text-align:center;margin-bottom:2px\">{{ c.day }}<\u002Fdiv>\n                      <input value=\"{{ c.value }}\" onchange=\"{{ c.onChange }}\" inputmode=\"decimal\" style=\"width:100%;font-family:inherit;font-size:11.5px;font-weight:600;text-align:center;padding:5px 1px;border:1px solid rgba(0,0,0,.12);border-radius:6px;background:#fff;color:#1c1a17;min-width:0;outline:none\" style-focus=\"border-color:#e4002b\">\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ row.isSingle }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:11px 16px;border-top:1px solid rgba(0,0,0,.035);display:flex;align-items:center;justify-content:space-between;gap:10px\">\n                <div style=\"display:flex;align-items:center;gap:8px;min-width:0\">\n                  <span style=\"{{ row.dotStyle }}\"><\u002Fspan>\n                  <span style=\"font-size:13px;font-weight:500;color:#36322c;line-height:1.25\">{{ row.label }}<\u002Fspan>\n                  <span style=\"{{ row.tagStyle }}\">{{ row.tag }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:6px;flex:none\">\n                  <span style=\"{{ row.unitStyle }}\">{{ row.unit }}<\u002Fspan>\n                  <input value=\"{{ row.single.value }}\" onchange=\"{{ row.single.onChange }}\" inputmode=\"decimal\" style=\"width:92px;font-family:inherit;font-size:13.5px;font-weight:700;text-align:right;padding:6px 9px;border:1px solid rgba(0,0,0,.12);border-radius:8px;background:#fff;color:#1c1a17;outline:none\" style-focus=\"border-color:#e4002b\">\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ row.isYN }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:9px 16px;border-top:1px solid rgba(0,0,0,.035)\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px\">\n                  <div style=\"display:flex;align-items:center;gap:8px;min-width:0\">\n                    <span style=\"{{ row.dotStyle }}\"><\u002Fspan>\n                    <span style=\"font-size:13px;font-weight:500;color:#36322c;line-height:1.25\">{{ row.label }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <span style=\"{{ row.totalStyle }}\">{{ row.totalText }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-top:8px\">\n                  <sc-for list=\"{{ row.cells }}\" as=\"c\" hint-placeholder-count=\"6\">\n                    <div>\n                      <div style=\"font-size:8.5px;font-weight:700;color:#b3aca0;text-align:center;margin-bottom:2px\">{{ c.day }}<\u002Fdiv>\n                      <button onclick=\"{{ c.onClick }}\" style=\"{{ c.style }}\">{{ c.text }}<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ row.isText }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:10px 16px;border-top:1px solid rgba(0,0,0,.035)\">\n                <div style=\"font-size:13px;font-weight:600;color:#36322c;margin-bottom:7px\">{{ row.label }}<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:5px\">\n                  <sc-for list=\"{{ row.cells }}\" as=\"c\" hint-placeholder-count=\"6\">\n                    <div style=\"display:flex;align-items:center;gap:8px\">\n                      <span style=\"font-size:11px;font-weight:700;color:#b06a00;flex:none;width:32px\">{{ c.day }}<\u002Fspan>\n                      <input value=\"{{ c.value }}\" onchange=\"{{ c.onChange }}\" placeholder=\"—\" style=\"flex:1;font-family:inherit;font-size:12px;padding:5px 8px;border:1px solid rgba(0,0,0,.12);border-radius:7px;background:#fff;color:#36322c;outline:none;min-width:0\" style-focus=\"border-color:#e4002b\">\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n\n    <div style=\"text-align:center;font-size:11px;color:#a39c90;font-weight:500;padding:8px 0\">Totals and scores calculate automatically · everyone on the same team code edits the same live scorecard<\u002Fdiv>\n\n    <sc-if value=\"{{ showQR }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-noprint=\"1\" onclick=\"{{ closeQR }}\" style=\"position:fixed;inset:0;z-index:50;background:rgba(28,26,23,.55);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:24px\">\n        <div onclick=\"{{ stop }}\" style=\"background:#fffdf9;border-radius:18px;padding:24px;max-width:340px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.32)\">\n          <div style=\"font-size:17px;font-weight:800;letter-spacing:-.01em;margin-bottom:4px\">Scan to join<\u002Fdiv>\n          <div style=\"font-size:12px;font-weight:500;color:#8a847a;margin-bottom:16px;line-height:1.4\">Open your phone camera and point it at the code to start entering on that device<\u002Fdiv>\n          <div style=\"display:flex;justify-content:center;margin-bottom:16px\">\n            <img src=\"{{ qrUrl }}\" alt=\"QR code\" style=\"width:208px;height:208px;border-radius:10px;border:1px solid rgba(0,0,0,.08);image-rendering:pixelated\">\n          <\u002Fdiv>\n          <div style=\"font-size:11px;font-weight:700;color:#8a847a;text-transform:uppercase;letter-spacing:.06em\">Team code<\u002Fdiv>\n          <div style=\"font-size:18px;font-weight:800;letter-spacing:.04em;margin-bottom:18px\">{{ room }}<\u002Fdiv>\n          <button onclick=\"{{ closeQR }}\" style=\"font-family:inherit;font-size:13px;font-weight:700;padding:9px 22px;border-radius:10px;cursor:pointer;border:none;background:#1c1a17;color:#fff\" style-active=\"transform:scale(.96)\">Close<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:600,&quot;height&quot;:940}}\">\nclass Component extends DCLogic {\n  LS = 'cfa_scorecard_fill_v1';\n  ROOM = 'cfa_scorecard_room_v1';\n  RELAYS = ['https://gun-manhattan.herokuapp.com/gun','https://gun-us.herokuapp.com/gun','https://peer.wallie.io/gun'];\n  state = { data: {}, room: '', online: false, showQR: false, qrUrl: '', shareLink: '', locked: false, codeInput: '' };\n\n  componentDidMount(){\n    let data={}; try { const raw=localStorage.getItem(this.LS); if (raw) data=JSON.parse(raw); } catch(e){}\n    let room=''; try { room=localStorage.getItem(this.ROOM)||''; } catch(e){}\n    const hash=(location.hash||'').replace(/^#/,'').trim().toUpperCase();\n    if (hash){ if (hash!==room){ data={}; } room=hash; try{ localStorage.setItem(this.ROOM, room); }catch(e){} }\n    if (room){\n      try { history.replaceState(null,'','#'+room); } catch(e){}\n      this.setState({ data, room, locked:false });\n      this.initSync(room, data);\n    } else {\n      this.setState({ data:{}, locked:true });\n    }\n  }\n  enterCode(){\n    const code=(this.state.codeInput||'').trim().toUpperCase();\n    if (!code) return;\n    try { localStorage.setItem(this.ROOM, code); localStorage.setItem(this.LS, JSON.stringify({})); } catch(e){}\n    try { history.replaceState(null,'','#'+code); } catch(e){}\n    this.setState({ room:code, data:{}, locked:false });\n    this.initSync(code, {});\n  }\n  startNew(){\n    const code=this.genCode();\n    try { localStorage.setItem(this.ROOM, code); localStorage.setItem(this.LS, JSON.stringify({})); } catch(e){}\n    try { history.replaceState(null,'','#'+code); } catch(e){}\n    this.setState({ room:code, data:{}, locked:false });\n    this.initSync(code, {});\n  }\n  genCode(){ const r=()=>Math.random().toString(36).slice(2,5).toUpperCase(); return 'FT-'+r()+r(); }\n  waitGun(cb, n){ n=n||0; if (window.Gun) return cb(); if (n>40) return; setTimeout(()=>this.waitGun(cb, n+1), 150); }\n  initSync(room, localData){\n    this.waitGun(()=>{\n      try {\n        this.gun = window.Gun(this.RELAYS);\n        this.node = this.gun.get('cfa_scorecard_v2_'+room);\n        this.node.on((d)=>{\n          if (!d) return;\n          const inc={}; Object.keys(d).forEach(k=>{ if (k!=='_' && d[k]!==null && d[k]!==undefined) inc[k]=d[k]; });\n          if (!Object.keys(inc).length) return;\n          this.setState(s=>{ const data={...s.data, ...inc}; this.save(data); return { data, online:true }; });\n        });\n        if (localData && Object.keys(localData).length){ const up={}; Object.keys(localData).forEach(k=>{ if(localData[k]!=='') up[k]=localData[k]; }); if(Object.keys(up).length){ try{ this.node.put(up); }catch(e){} } }\n        this.setState({ online:true });\n      } catch(e){ this.setState({ online:false }); }\n    });\n  }\n  save(data){ try { localStorage.setItem(this.LS, JSON.stringify(data)); } catch(e){} }\n  set(key, val){\n    this.setState(s=>{ const data={...s.data,[key]:val}; this.save(data); return {data}; });\n    if (this.node){ try { this.node.put({ [key]: val }); } catch(e){} }\n  }\n  copyCode(){ try { navigator.clipboard.writeText(this.state.room); alert('Team code '+this.state.room+' copied. Share it with anyone who should enter on their device.'); } catch(e){} }\n  copyLink(){ try { const url=location.href.split('#')[0]+'#'+this.state.room; navigator.clipboard.writeText(url); alert('Share link copied.\\n\\nAnyone who opens it joins this scorecard automatically (team code '+this.state.room+').'); } catch(e){ alert('Share link: '+location.href.split('#')[0]+'#'+this.state.room); } }\n  openQR(){\n    const link=location.href.split('#')[0]+'#'+this.state.room;\n    let url='';\n    try { const qr=window.qrcode(0,'M'); qr.addData(link); qr.make(); url=qr.createDataURL(7,12); } catch(e){}\n    this.setState({ showQR:true, qrUrl:url, shareLink:link });\n  }\n  closeQR(){ this.setState({ showQR:false }); }\n  onCodeInput(e){ this.setState({ codeInput: e.target.value }); }\n  joinBoard(){\n    const code = (typeof prompt==='function') ? prompt('Enter the team sync code to join an existing board:', '') : '';\n    if (!code) return;\n    const room=code.trim().toUpperCase();\n    try { localStorage.setItem(this.ROOM, room); localStorage.setItem(this.LS, JSON.stringify({})); } catch(e){}\n    try { history.replaceState(null,'','#'+room); } catch(e){}\n    location.reload();\n  }\n  newWeek(){\n    if (typeof confirm==='function' && !confirm('Start a NEW week? This creates a fresh sync code and a blank form. Share the new code with your team. Last week stays saved under its old code.')) return;\n    const room=this.genCode();\n    try { localStorage.setItem(this.ROOM, room); localStorage.setItem(this.LS, JSON.stringify({})); } catch(e){}\n    try { history.replaceState(null,'','#'+room); } catch(e){}\n    location.reload();\n  }\n\n  // ---------- spec ----------\n  T(op,val,unit){ return {op,val,unit:unit||''}; }\n  buildSpec(){\n    const T=this.T;\n    return [\n      {title:'Sales & Transactions', rows:[\n        {l:'Sales', m:'cur'},\n        {l:'Drive Thru', m:'cur'},\n        {l:'On Demand', m:'cur'},\n        {l:'Front Counter', m:'cur'},\n        {l:'Catering', m:'cur'},\n        {l:'Transactions', m:'cnt'},\n        {l:'DT Transactions', m:'cnt'},\n        {l:'OD Transactions', m:'cnt'},\n        {l:'FC Transactions', m:'cnt'},\n        {l:'Catering Transactions', m:'cnt'},\n        {l:'Check Average', m:'avgcur', t:T('>=',17,'$')},\n      ]},\n      {title:'Inventory', rows:[\n        {l:'Recorded Waste', m:'cur', t:T('<',1000,'$')},\n        {l:'Missing (positive gap)', m:'cur'},\n        {l:'Missing (negative gap)', m:'cur'},\n        {l:'Total Waste', m:'cur'},\n        {l:'Total Waste %', m:'pct', t:T('<',2,'%')},\n        {sub:'Missing Items (lbs gap)'},\n        {l:'Regular Filets', m:'num'},\n        {l:'Grilled Filets', m:'num'},\n        {l:'Spicy Filets', m:'num'},\n        {l:'Nuggets', m:'num'},\n        {l:'Grilled Nuggets', m:'num'},\n        {l:'Tenders', m:'num'},\n        {l:\"Waffle Fry's\", m:'num'},\n        {sub:'Operations'},\n        {l:'AHA Scan Usage', m:'navg', t:T('>=',99,'')},\n        {l:'AHA Hold Time', m:'pct', t:T('>',99,'%')},\n        {l:'Target Zone', m:'pct'},\n        {l:'Transfers', m:'cnt'},\n        {l:\"QIC's Open\", m:'sNum'},\n        {l:\"QIC's Denied\", m:'sNum'},\n        {l:\"QIC's Approved\", m:'sNum'},\n        {l:'Suggested Ordering', m:'sPct', t:T('>',95,'%')},\n      ]},\n      {title:'Cash Management', rows:[\n        {l:'Refunds', m:'cur'},\n        {l:'Cash Over', m:'cur', t:T('<',10,'$')},\n        {l:'Cash Short', m:'cur', t:T('<',10,'$')},\n        {l:'Employee', m:'cur'},\n        {l:'Open $', m:'cur'},\n        {l:'Police', m:'cur'},\n        {l:'Promo / Free', m:'cur', t:T('<',300,'$')},\n        {l:'Paid In', m:'cur'},\n        {l:'Paid Out', m:'cur'},\n        {l:'Change Fund Ordered', m:'cur'},\n        {l:'Change Fund Received', m:'cur'},\n      ]},\n      {title:'Labor', rows:[\n        {l:'Productivity', m:'avgcur', t:T('>=',102,'$')},\n        {l:'Hours Worked', m:'num'},\n        {l:'Paid Breaks', m:'num'},\n        {l:'Did not take required break', m:'num'},\n        {l:'Overtime', m:'num'},\n        {l:'Callouts', m:'text'},\n        {l:'Late / Early Departure', m:'text'},\n      ]},\n      {title:'Checklists', rows:[\n        {l:'BOH Open', m:'yn', t:T('yn')},\n        {l:'BOH Close', m:'yn', t:T('yn')},\n        {l:'FC Open', m:'yn', t:T('yn')},\n        {l:'FC Close', m:'yn', t:T('yn')},\n        {l:'DT Open', m:'yn', t:T('yn')},\n        {l:'DT Close', m:'yn', t:T('yn')},\n        {l:'Food Safety Walk Through', m:'yn', t:T('yn')},\n        {l:'5 x 5', m:'yn', t:T('yn')},\n        {l:'Transition Check List', m:'yn', t:T('yn')},\n      ]},\n      {title:'Guest Experience', rows:[\n        {l:'Opened on Time', m:'yn', t:T('yn')},\n        {sub:'% SoS above 7 min'},\n        {l:'Drive Thru', m:'pct', t:T('<',10,'%')},\n        {l:'Front Counter', m:'pct', t:T('<',10,'%')},\n        {sub:'CARES / Contacts'},\n        {l:'CARES', m:'sNum'},\n        {l:'Compliments', m:'sNum'},\n        {l:'Missing Item', m:'sNum'},\n        {l:'Attentiveness / Courtesy', m:'sNum'},\n        {l:'Food Quality', m:'sNum'},\n        {l:'Food Safety', m:'sNum'},\n        {l:'Incorrect Item', m:'sNum'},\n        {l:'Sauces', m:'sNum'},\n        {sub:'CEM Surveys'},\n        {l:'CEM Surveys', m:'sNum'},\n        {l:'CEM OSAT Carryout / Dine-in', m:'sPct', t:T('>=',80,'%')},\n        {l:'CEM OSAT Drive-Thru', m:'sPct', t:T('>=',80,'%')},\n        {l:'CEM Taste', m:'sPct', t:T('>=',80,'%')},\n        {l:'CEM Temperature', m:'sPct'},\n        {l:'CEM Fast Service', m:'sPct', t:T('>=',75,'%')},\n        {l:'CEM Attentive / Courteous', m:'sPct', t:T('>=',80,'%')},\n        {l:'CEM Cleanliness', m:'sPct', t:T('>=',75,'%')},\n        {l:'CEM Order Accuracy', m:'sPct', t:T('>=',97,'%')},\n        {sub:'Ratings'},\n        {l:'Google Rating', m:'sNum', t:T('>=',4.0,'')},\n        {l:'DoorDash', m:'sNum'},\n        {l:'Uber Eats', m:'sNum'},\n      ]},\n    ];\n  }\n\n  // ---------- helpers ----------\n  parseNum(v){ if (v===undefined||v===null||v==='') return null; const n=parseFloat(String(v).replace(/[$,%\\s]/g,'')); return isNaN(n)?null:n; }\n  commas(n,d){ return Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}); }\n  isDaily(m){ return ['cur','cnt','num','avgcur','pct','navg'].includes(m); }\n  isAvg(m){ return ['avgcur','pct','navg'].includes(m); }\n  unitOf(m){ if(['cur','avgcur','sCur'].includes(m))return '$'; if(['pct','sPct'].includes(m))return '%'; return ''; }\n\n  aggregate(m, vals){\n    const nums = vals.map(v=>this.parseNum(v)).filter(n=>n!==null);\n    if (!nums.length) return null;\n    const sum = nums.reduce((a,b)=>a+b,0);\n    return this.isAvg(m) ? sum/nums.length : sum;\n  }\n  fmtAgg(m, val){\n    if (val===null) return '—';\n    if (m==='cur'||m==='avgcur') return '$'+this.commas(val, Math.abs(val%1)<1e-9?0:2);\n    if (m==='pct') return this.commas(val, val%1?1:0)+'%';\n    if (m==='navg') return this.commas(val, val%1?1:0);\n    if (m==='cnt') return this.commas(val,0);\n    return this.commas(val, Math.abs(val%1)<1e-9?0:2);\n  }\n  pass(t, value){\n    if (!t || value===null) return false;\n    if (t.op==='>') return value>t.val;\n    if (t.op==='<') return value<t.val;\n    if (t.op==='>=') return value>=t.val;\n    if (t.op==='<=') return value<=t.val;\n    return false;\n  }\n  tagText(t){ if(!t||t.op==='yn') return ''; const sym=t.op==='>='?'≥':t.op==='<='?'≤':t.op; const v=t.unit==='$'?'$'+t.val:t.unit==='%'?t.val+'%':t.val; return sym+' '+v; }\n  scoreColor(f){ if (f>=0.9) return '#1f7a4d'; if (f>=0.7) return '#3f8f3f'; if (f>=0.5) return '#c98a00'; return '#cc3a2e'; }\n\n  // ---------- build view ----------\n  renderVals(){\n    const spec = this.buildSpec();\n    const data = this.state.data;\n    const dayInit=['M','T','W','T','F','S'];\n    const dayFull=['Mon','Tue','Wed','Thu','Fri','Sat'];\n    const dotPass='flex:none;width:7px;height:7px;border-radius:50%;background:#3f8f3f';\n    const dotFail='flex:none;width:7px;height:7px;border-radius:50%;background:#cc3a2e';\n    const dotNone='flex:none;width:7px;height:7px;border-radius:50%;background:transparent';\n    const tagStyle='font-size:10px;font-weight:700;color:#a39c90;background:rgba(0,0,0,.045);padding:1px 6px;border-radius:5px;white-space:nowrap;flex:none';\n\n    const sectionPcts=[];\n    const sections = spec.map((sec, si)=>{\n      let scored=0, passed=0;\n      const rows = sec.rows.map((r, ri)=>{\n        if (r.sub) return {isSub:true, label:r.sub};\n        const baseKey='s'+si+'r'+ri;\n        const hasScore = !!r.t;\n\n        // ---- YES / NO ----\n        if (r.m==='yn'){\n          const vals = dayInit.map((_,di)=> data[baseKey+'d'+di] || '');\n          const noN = vals.filter(v=>v==='No').length;\n          const yesN = vals.filter(v=>v==='Yes').length;\n          const ok = yesN>0 && noN===0;\n          if (hasScore){ scored++; if (ok) passed++; }\n          const cells = vals.map((v,di)=>{\n            const key=baseKey+'d'+di;\n            let st='width:100%;font-family:inherit;font-size:11px;font-weight:800;padding:5px 1px;border-radius:6px;cursor:pointer;border:1px solid rgba(0,0,0,.12);background:#fff;color:#c4bdb0';\n            let tx='–';\n            if (v==='Yes'){ st='width:100%;font-family:inherit;font-size:11px;font-weight:800;padding:5px 1px;border-radius:6px;cursor:pointer;border:1px solid #3f8f3f;background:#eaf4ea;color:#2f7a2f'; tx='Yes'; }\n            else if (v==='No'){ st='width:100%;font-family:inherit;font-size:11px;font-weight:800;padding:5px 1px;border-radius:6px;cursor:pointer;border:1px solid #cc3a2e;background:#fbeae8;color:#c0392b'; tx='No'; }\n            return {day:dayInit[di], text:tx, style:st, onClick:()=>{ const nv = v===''?'Yes':v==='Yes'?'No':''; this.set(key, nv); }};\n          });\n          const totalText = ok?'Complete':(noN>0?'Issue':'—');\n          const totalStyle = ok\n            ? 'flex:none;font-size:11px;font-weight:800;padding:2px 9px;border-radius:999px;background:#3f8f3f;color:#fff'\n            : (noN>0 ? 'flex:none;font-size:11px;font-weight:800;padding:2px 9px;border-radius:999px;background:#cc3a2e;color:#fff'\n                     : 'flex:none;font-size:12px;font-weight:700;color:#c4bdb0');\n          return {isYN:true, label:r.l, dotStyle:hasScore?(ok?dotPass:dotFail):dotNone, cells, totalText, totalStyle};\n        }\n\n        // ---- TEXT ----\n        if (r.m==='text'){\n          const cells = dayFull.map((d,di)=>{ const key=baseKey+'d'+di; return {day:d, value:data[key]||'', onChange:(e)=>this.set(key, e.target.value)}; });\n          return {isText:true, label:r.l, cells};\n        }\n\n        // ---- SINGLE ----\n        if (['sNum','sPct','sCur'].includes(r.m)){\n          const key=baseKey+'t';\n          const val=this.parseNum(data[key]);\n          const ok = hasScore && this.pass(r.t, val);\n          if (hasScore){ scored++; if (ok) passed++; }\n          return {\n            isSingle:true, label:r.l,\n            tag:this.tagText(r.t), tagStyle: r.t?tagStyle:'display:none',\n            dotStyle: hasScore?(val===null?dotFail:(ok?dotPass:dotFail)):dotNone,\n            unit: this.unitOf(r.m), unitStyle: this.unitOf(r.m)?'font-size:13px;font-weight:700;color:#8a847a':'display:none',\n            single:{ value:data[key]||'', onChange:(e)=>this.set(key, e.target.value) }\n          };\n        }\n\n        // ---- DAILY NUMERIC ----\n        const vals = dayInit.map((_,di)=> data[baseKey+'d'+di] || '');\n        const agg = this.aggregate(r.m, vals);\n        const ok = hasScore && this.pass(r.t, agg);\n        if (hasScore){ scored++; if (ok) passed++; }\n        const cells = vals.map((v,di)=>{ const key=baseKey+'d'+di; return {day:dayInit[di], value:v, onChange:(e)=>this.set(key, e.target.value)}; });\n        return {\n          isNum:true, label:r.l,\n          tag:this.tagText(r.t), tagStyle: r.t?tagStyle:'display:none',\n          dotStyle: hasScore?(agg===null?dotFail:(ok?dotPass:dotFail)):dotNone,\n          totalText:this.fmtAgg(r.m, agg),\n          totalStyle: agg===null?'flex:none;font-size:13px;font-weight:700;color:#c4bdb0':'flex:none;font-size:14px;font-weight:800;letter-spacing:-.01em;color:#1c1a17',\n          cells\n        };\n      });\n\n      const frac = scored? passed/scored : null;\n      sectionPcts.push(frac);\n      const scoreText = frac===null? '—' : Math.round(frac*100)+'%';\n      const scoreStyle = frac===null\n        ? 'flex:none;font-size:12px;font-weight:800;padding:4px 10px;border-radius:999px;background:rgba(0,0,0,.05);color:#a39c90'\n        : `flex:none;font-size:12px;font-weight:800;padding:4px 10px;border-radius:999px;background:${this.scoreColor(frac)};color:#fff`;\n      return {title:sec.title, scoreText, scoreStyle, rows, enteredBy:data['s'+si+'_by']||'', onEnteredBy:(e)=>this.set('s'+si+'_by', e.target.value)};\n    });\n\n    const valid = sectionPcts.filter(p=>p!==null);\n    const overall = valid.length? valid.reduce((a,b)=>a+b,0)/valid.length : null;\n    const overallText = overall===null? '—' : Math.round(overall*100)+'%';\n    const names=[];\n    spec.forEach((s,si)=>{ const n=(data['s'+si+'_by']||'').trim(); if(n) names.push(n); });\n    const contributorsText = names.length? Array.from(new Set(names)).join(', ') : 'None yet';\n    const overallStyle = overall===null\n      ? 'font-size:30px;font-weight:800;letter-spacing:-.02em;color:#c4bdb0'\n      : `font-size:30px;font-weight:800;letter-spacing:-.02em;color:${this.scoreColor(overall)}`;\n\n    return {\n      sections, overallText, overallStyle,\n      weekEnding: data._weekEnding||'', reviewedBy: data._reviewedBy||'', contributorsText,\n      onWeek:(e)=>this.set('_weekEnding', e.target.value),\n      onReviewed:(e)=>this.set('_reviewedBy', e.target.value),\n      print:()=>window.print(),\n      newWeek:()=>this.newWeek(),\n      room:this.state.room,\n      syncDotStyle:'width:8px;height:8px;border-radius:50%;flex:none;background:'+(this.state.online?'#3f8f3f':'#c4bdb0'),\n      syncStatus:this.state.online?'Live sync on':'This device only',\n      copyCode:()=>this.copyCode(),\n      copyLink:()=>this.copyLink(),\n      joinBoard:()=>this.joinBoard(),\n      showQR:this.state.showQR, qrUrl:this.state.qrUrl, shareLink:this.state.shareLink,\n      openQR:()=>this.openQR(),\n      closeQR:()=>this.closeQR(),\n      stop:(e)=>e.stopPropagation(),\n      locked:this.state.locked, codeInput:this.state.codeInput,\n      onCodeInput:(e)=>this.onCodeInput(e),\n      enterCode:()=>this.enterCode(),\n      startNew:()=>this.startNew(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
